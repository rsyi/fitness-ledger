name: "Cut · Deadlift (heavy)"
view: strength
description: >
  Cut-phase deadlift, normal/heavy mode. Bridged warmup to one quality top
  single (RPE 8-8.5), 2 backoff triples (~13% under), one paused technique
  set at the knee, then 3xAMRAP inverted rows. Confirm back is good before
  the top single — if guarded, switch to the light or reentry template.
  Weights are computed from `top_single` (rounded to nearest 5).
variables:
  - { name: top_single, label: "Top single (lb)", type: number, default: 340 }
entries:
  # Bridged warmup ramp
  - { exercise: Barbell Deadlift, weight: 45,  reps: 8, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 135, reps: 5, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 185, reps: 3, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 225, reps: 2, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: "{{ ((top_single * 0.78 / 5) | round) * 5 }}", reps: 1,   notes: "bridge" }
  - { exercise: Barbell Deadlift, weight: "{{ ((top_single * 0.90 / 5) | round) * 5 }}", reps: 1, notes: "bridge" }
  # Top single — autoregulated, RPE 8 to 8.5
  - { exercise: Barbell Deadlift, weight: "{{ top_single }}", reps: 1, notes: "top single — belted" }
  # Backoffs — ~13% under, 2 sets of 3
  - { exercise: Barbell Deadlift, weight: "{{ ((top_single * 0.87 / 5) | round) * 5 }}", reps: 3, notes: "backoff" }
  - { exercise: Barbell Deadlift, weight: "{{ ((top_single * 0.87 / 5) | round) * 5 }}", reps: 3, notes: "backoff" }
  # Paused technique set — paused at the knee, position-focused
  - { exercise: Barbell Deadlift, weight: "{{ ((top_single * 0.75 / 5) | round) * 5 }}", reps: 2,   notes: "paused at knee" }
  # Accessory: inverted rows, 3xAMRAP (edit reps after each set)
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
