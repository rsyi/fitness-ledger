# Airledger config — read at build time by brand.dart, resolved against
# .env, and baked into assets/config.yaml in the APK. Same shape as oxy's
# config.yml so the three tools (oxy, airlayer, airledger) share the
# contract. See ~/repos/airledger/docs/oxy-compatibility.md.

# Default spreadsheet for views with datasource: gsheets that don't
# specify their own spreadsheet_id.
spreadsheet_id: 1C1rSudguUv00gYsb7i82XV6OM1V2KSZ4BGwMliwKDG4

databases:
  - name: gsheets
    type: sheets
    spreadsheet_id: 1C1rSudguUv00gYsb7i82XV6OM1V2KSZ4BGwMliwKDG4
    service_account_key_path_var: GOOGLE_SA_KEY_PATH

# Models available to post_log hooks in .input.yml. Each entry's
# `api_key_var:` references an env var in .env that brand.dart resolves
# at build time into the concrete `api_key` value.
models:
  - name: sonnet
    vendor: anthropic
    model_ref: claude-3-5-sonnet-latest
    api_key_var: ANTHROPIC_API_KEY
