  - name: weight
    type: number
    expr: "Weight"
    input:
      widget: number
      required: true
      min: 0

  - name: reps
    type: number
    expr: "Reps"
    input:
      widget: number
      required: true
      min: 0
      max: 100

  - name: start_time
    type: string
    expr: "Start Time"
    description: Time of day (blank = planned). Tap the clock to stamp now.
    input:
      widget: text
      placeholder: 3:54:00 PM
      now_button: true

  - name: rpe
    type: number
    expr: "RPE"
    description: Rate of Perceived Exertion (1-10)
    input:
      widget: number
      min: 1
      max: 10

  - name: notes
    type: string
    expr: "Notes"
    input:
      widget: longtext

list_display:
  title: exercise
  subtitle: "${weight} × ${reps}"

measures:
  - name: set_count
    type: count
  - name: total_weight
    type: sum
    expr: weight
  # Estimated one-rep max via the Epley formula. Used by the
  # strength_1rm app to plot per-exercise progress over time.
  - name: max_e1rm
    type: max
    expr: "Weight * (1 + Reps / 30.0)"
    description: "Best estimated 1RM in the period (Epley)"
