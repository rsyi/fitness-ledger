name: strength
description: Strength set log (modeled after fitness-logger's data layout)
datasource: gsheets
table: strength
date_field: date

# Rows whose log_field is empty are "planned" — TimelineScreen shows a
# "Log now" button that stamps the current time in log_format.
plannable:
  log_field: start_time
  log_format: time_string   # "3:54:00 PM"

entities:
  - name: strength_set
    type: primary
    key: id

dimensions:
  - name: id
    type: string
    expr: id
    input:
      editable: false

  - name: date
    type: date
    expr: "Date"
    description: Workout day
    input:
      widget: date
      default: today
      required: true

  # Auto-derived from `date` at save time; hidden from the form.
  - name: day_of_week
    type: string
    expr: "Day of Week"
    derive:
      from: date
      format: weekday_long

  - name: exercise
    type: string
    expr: "Exercise"
    description: Exercise name (free-form; suggestions from history)
    input:
      widget: autocomplete
      required: true
      placeholder: e.g. Barbell Squat
    # 307 canonical exercises from fitness-logger history (consolidated by
    # tool/consolidate_exercises.dart). Sorted by use frequency. Free-form
    # text entry still works for ad hoc exercises.
