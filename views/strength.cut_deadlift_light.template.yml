target: strength.view.yml
name: "Cut · Deadlift (light)"
description: >
  Light deadlift — used on heavy-SQ weeks. No top single, 2 working triples
  at 70-80% of max, RPE 5-6. Spine recovers between heavy DL weeks via this
  alternation. Also use ad-hoc if back is guarded.
variables:
  - { name: light_weight, label: "Light weight (lb)", type: number, default: 275 }
entries:
  # Short warmup
  - { exercise: Barbell Deadlift, weight: 45,  reps: 5, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 135, reps: 3, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 225, reps: 2, notes: "warmup" }
  # Working sets — 70-80% of max, RPE 5-6
  - { exercise: Barbell Deadlift, weight: "{{ light_weight }}", reps: 3, notes: "light — belted" }
  - { exercise: Barbell Deadlift, weight: "{{ light_weight }}", reps: 3, notes: "light — belted" }
  # Accessory
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
