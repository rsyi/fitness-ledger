name: workouts
description: Workout log (strength, cardio, mobility, climbing)
datasource: gsheets
table: workouts
entities:
  - { name: workout, type: primary, key: id }
dimensions:
  - { name: id, type: string, expr: id }
  - { name: done_at, type: datetime, expr: done_at, description: When the workout was completed }
  - { name: kind, type: string, expr: kind, description: Workout modality }
  - { name: duration_min, type: number, expr: duration_min, description: Total duration in minutes }
  - { name: notes, type: string, expr: notes, description: Free-form notes (sets, reps, route grades, etc.) }
measures:
  - { name: workout_count, type: count }
  - { name: total_duration_min, type: sum, expr: duration_min }
