name: cardio
description: "4x4 HIIT cardio — one row per interval set"
datasource: gsheets
table: cardio
entities:
  - { name: cardio_set, type: primary, key: id }
dimensions:
  - { name: id, type: string, expr: id }
  - { name: date, type: date, expr: Date, description: Workout day }
  - { name: day_of_week, type: string, expr: Day of Week }
  - { name: type, type: string, expr: Type, description: Cardio modality (drives which fields show below) }
  - { name: incline, type: number, expr: Treadmill Incline, description: Incline (%) }
  - { name: treadmill_speed, type: number, expr: Treadmill Speed, description: Speed (mph) }
  - { name: stairmaster_speed, type: number, expr: Stairmaster Speed, description: Level / speed }
  - { name: zone4_reached, type: string, expr: Time Zone 4 Reached, description: Time you hit Zone 4 (blank = never reached) }
  - { name: zone5_reached, type: string, expr: Time Zone 5 Reached, description: Time you hit Zone 5 (blank = never reached) }
  - { name: total_time, type: string, expr: Total Time, description: Total interval time (mm:ss) }
  - { name: max_hr, type: number, expr: Max Heart Rate, description: Max heart rate during this interval }
  - { name: start_time, type: string, expr: Start Time, description: Time of day (blank = planned). Tap the clock to stamp now. }
  - { name: notes, type: string, expr: Notes }
measures:
  - { name: interval_count, type: count }
