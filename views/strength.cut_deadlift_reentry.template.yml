target: strength.view.yml
name: "Cut · Deadlift (reentry)"
description: >
  Reentry mode — returning from a deload or back issue. One conservative
  top single 15-20 lb below normal, capped at RPE 8, to confirm readiness
  before resuming progression. Light backoffs only, no paused work.
variables:
  - { name: reentry_single, label: "Reentry single (lb)", type: number, default: 320 }
entries:
  # Bridged warmup ramp
  - { exercise: Barbell Deadlift, weight: 45,  reps: 8, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 135, reps: 5, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 185, reps: 3, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: 225, reps: 2, notes: "warmup" }
  - { exercise: Barbell Deadlift, weight: "{{ ((reentry_single * 0.78 / 5) | round) * 5 }}", reps: 1,   notes: "bridge" }
  - { exercise: Barbell Deadlift, weight: "{{ ((reentry_single * 0.90 / 5) | round) * 5 }}", reps: 1, notes: "bridge" }
  # Conservative reentry single — cap at RPE 8 regardless of how it feels
  - { exercise: Barbell Deadlift, weight: "{{ reentry_single }}", reps: 1, notes: "reentry single — belted, cap RPE 8" }
  # Light backoffs (~15% below the reentry single)
  - { exercise: Barbell Deadlift, weight: "{{ ((reentry_single * 0.85 / 5) | round) * 5 }}", reps: 3, notes: "backoff" }
  - { exercise: Barbell Deadlift, weight: "{{ ((reentry_single * 0.85 / 5) | round) * 5 }}", reps: 3, notes: "backoff" }
  # Accessory
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
  - { exercise: Inverted Row, reps: 12, notes: "AMRAP — edit reps" }
