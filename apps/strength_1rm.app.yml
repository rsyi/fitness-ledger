# Per-exercise estimated one-rep max (Epley) over time.
#
# The `e1rm` measure is declared on the strength view itself (see
# strength.view.yml). Here we pick an exercise via dropdown and plot the
# max e1rm per day.
name: strength_1rm
title: Estimated 1RM progress
description: Pick an exercise, see your best estimated one-rep max over time

controls:
  - id: exercise
    type: dropdown
    label: Exercise
    options_from:
      view: strength
      dimension: exercise
      order: count_desc
      limit: 100

tasks:
  - name: by_date
    semantic_query:
      view: strength
      dimensions: [strength.date]
      measures: [strength.max_e1rm]
      filters:
        - { dim: strength.exercise, op: eq, value: "{{ controls.exercise }}" }
      order:
        - { id: strength.date, desc: false }

display:
  - markdown: "{{ controls.exercise }} — estimated 1RM"
  - line_chart:
      data: by_date
      x: strength__date
      y: strength__max_e1rm
      title: e1rm per day (Epley)
